# Exposition publique via Cloudflare Tunnel (complément de docker-compose.yml).
#
# Prérequis :
#   1. Créer un tunnel dans Cloudflare Zero Trust (connecteur Docker / token)
#   2. Ajouter dans .env : CLOUDFLARE_TUNNEL_TOKEN="eyJ..."
#   3. Dans Zero Trust → tunnel → Public Hostname :
#        Service URL = http://caddy:80  (réseau Docker, PAS localhost)
#   4. AUTH_URL dans .env = https://votre-sous-domaine.votre-domaine
#
# Lancement :
#   docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d
#
# Alternative (config.yml + credentials JSON) : voir cloudflare/config.yml.example

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      - caddy

  # Derrière Cloudflare : pas de port 80 sur l'hôte (évite conflit avec nginx, etc.)
  # Le tunnel atteint Caddy via le réseau Docker : http://caddy:80
  caddy:
    ports: []
